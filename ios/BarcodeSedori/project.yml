name: BarcodeSedori
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    # v11系に固定(GADプレフィックスAPI)。最新v12系へ上げる場合はコード側のシンボル名も変更が必要。
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 11.0.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  BarcodeSedori:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
        optional: true
    dependencies:
      - package: GoogleMobileAds
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: バーコードせどり
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "バーコードをスキャンして商品を検索するためにカメラを使用します。"
        NSLocalNetworkUsageDescription: "同一Wi-Fi内のPCで動作する価格検索サーバーに接続するためにローカルネットワークを使用します。"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - barcodesedori
            CFBundleURLName: com.example.barcodesedori
        # AdMob: 現在はGoogleのテスト用アプリID。公開前に自分のAdMobアプリIDへ差し替えること。
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        NSUserTrackingUsageDescription: "広告をあなたに合わせて最適化するために使用します。許可しなくてもアプリは利用できます。"
        # SKAdNetwork: Google広告の主要ID。最適化のため公式ドキュメントの全リストを追加推奨。
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.barcodesedori
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

schemes:
  BarcodeSedori:
    build:
      targets:
        BarcodeSedori: all
    run:
      config: Debug
      # ローカルStoreKitテスト構成。storeKitConfiguration非対応のXcodeGenならこの行を外す。
      storeKitConfiguration: BarcodeSedori.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
